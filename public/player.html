<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    font-family: Arial, sans-serif;
    color: white;
    background: url('nen_game.jpg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* Buzz ở trên, guess ở dưới */
    align-items: center;
  }

  h1 {
    font-size: 60px;
    color: gold;
    margin-top: 20px;
    text-align: center;
  }

  h2 {
    font-size: 30px;
    margin-bottom: 10px;
  }

  #name {
    font-size: 24px;
    padding: 10px;
    width: 60%;
    max-width: 400px;
    text-align: center;
    border-radius: 8px;
    border: none;
  }

  #buzzBtn {
    font-size: 40px;
    background: red;
    color: white;
    padding: 20px 40px;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    cursor: pointer;
  }

  #guessBtn {
    font-size: 30px;
    background: green;
    color: white;
    padding: 15px 30px;
    border: none;
    border-radius: 10px;
    margin-bottom: 30px;
    cursor: pointer;
  }

  /* Responsive cho điện thoại */
  @media (max-width: 600px) {
    h1 { font-size: 40px; }
    h2 { font-size: 20px; }
    #name { font-size: 20px; width: 80%; }
    #buzzBtn { font-size: 30px; padding: 15px 30px; }
    #guessBtn { font-size: 24px; padding: 12px 25px; }
  }
</style>
</head>
<body>

  <!-- Input tên -->
<div>
  <h1>OLYMPIA</h1>
  <h2>ENTER NAME</h2>
  <input id="name" placeholder="Your Name"><br><br>
</div>

<!-- Button PRESS BUZZER ở trên -->
<button id="buzzBtn" onclick="buzz()">🔴 PRESS BUZZER</button> 

<!-- Button GUESS KEYWORD ở dưới -->
<button id="guessBtn" onclick="guessKeyword()">🎯 GUESS KEYWORD</button> 

<script>
const socket = io();

// Bấm chuông
function buzz(){
  const name = document.getElementById("name").value.trim();
  if(!name) { alert("Enter name before pressing the buzzer!"); return; }
  socket.emit("buzz", name);
}

// Đoán từ khóa
function guessKeyword(){
  const name = document.getElementById("name").value.trim();
  if(!name) { alert("Enter your name before guessing!"); return; }

  socket.emit("playerGuess", { name: name, guess: "Đoán từ khóa" });
  alert("🎯 Guess already submitted!!");
}
</script>

</body>
</html>
