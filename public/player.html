<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Player</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: white;
  background: url('nen_game.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* Layout chính */
.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

/* Header */
.header {
  text-align: center;
}

h1 {
  font-size: 42px;
  color: gold;
  margin: 10px 0;
}

h2 {
  font-size: 18px;
  margin: 5px 0;
  opacity: 0.9;
}

/* Input */
#name {
  width: 100%;
  max-width: 400px;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: center;
}

/* Button chung */
button {
  width: 100%;
  max-width: 500px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

/* Buzz button */
#buzzBtn {
  font-size: 28px;
  padding: 18px;
  background: linear-gradient(45deg, red, darkred);
}

#buzzBtn:active {
  transform: scale(0.95);
}

/* Guess button */
#guessBtn {
  font-size: 22px;
  padding: 16px;
  background: linear-gradient(45deg, green, darkgreen);
  margin-bottom: 10px;
}

#guessBtn:active {
  transform: scale(0.95);
}

/* Mobile tối ưu */
@media (max-width: 600px) {
  h1 { font-size: 34px; }
  #buzzBtn { font-size: 24px; padding: 16px; }
  #guessBtn { font-size: 20px; }
}

/* Hiệu ứng glow nhẹ */
#buzzBtn {
  box-shadow: 0 0 15px rgba(255,0,0,0.6);
}

#guessBtn {
  box-shadow: 0 0 10px rgba(0,255,0,0.5);
}

</style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="header">
    <h1>OLYMPIA</h1>
    <h2>ENTER NAME</h2>
    <input id="name" placeholder="Your Name">
  </div>

  <!-- MIDDLE -->
  <button id="buzzBtn" onclick="buzz()">🔴 PRESS BUZZER</button>

  <!-- BOTTOM -->
  <button id="guessBtn" onclick="guessKeyword()">🎯 GUESS KEYWORD</button>

</div>

<script>
const socket = io();

// Bấm chuông
function buzz(){
  const name = document.getElementById("name").value.trim();
  if(!name){
    alert("Enter name before pressing the buzzer!");
    return;
  }
  socket.emit("buzz", name);
}

// Đoán từ khóa
function guessKeyword(){
  const name = document.getElementById("name").value.trim();
  if(!name){
    alert("Enter your name before guessing!");
    return;
  }

  socket.emit("playerGuess", { name: name, guess: "Keyword" });
  alert("🎯 Guess submitted!");
}
</script>

</body>
</html>
